<head>
  <title>kheAI Nostr AI</title>
  <style>
    body { background: #000; color: #0f0; font-family: monospace; padding: 20px; }
    .lead-card { border: 1px solid #333; padding: 10px; margin-bottom: 10px; }
    .high-confidence { border-color: #0f0; }
    .low-confidence { border-color: #550; color: #888; }
    .signal-glow { border: 2px solid #00ff00; box-shadow: 0 0 10px #00ff0033; background: #001a00; }
    .noise-dim { border: 1px solid #333; opacity: 0.6; }
    .bolt { color: #ffcc00; font-weight: bold; margin-right: 15px; }
    .pubkey { color: #888; font-size: 0.8em; }
    .ai-box { margin-top: 10px; border-top: 1px solid #222; padding-top: 5px; font-size: 0.9em; }
  </style>
</head>

<body>
  <h1>kheAI</h1>
  {{> leadBoard}}
</body>

<template name="leadBoard">
  <div class="stats">
    Monitoring Firehose... ({{leads.length}} events in memory)
  </div>

  {{#each leads}}
    <div class="lead-card {{#if isSignal}}signal-glow{{else}}noise-dim{{/if}}">
      <div class="header">
        <span class="bolt">⚡ {{amount}} SATS</span>
        <span class="pubkey">From: {{sender}}...</span>
        <a href="https://primal.net/e/{{zappedNoteId}}" target="_blank" style="float:right; color:#ff00ff; text-decoration:none;">View Source ↗</a>
      </div>
      
      <p class="note">"{{note}}"</p>
      
      <div class="ai-box">
        <strong>Verdict:</strong> {{verdict}} 
        <span class="conf">({{confidence}}%)</span>
      </div>
    </div>
  {{/each}}
</template>
