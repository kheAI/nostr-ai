<head>
  <title>kheAI Nostr AI</title>
  <style>
    body { background: #000; color: #0f0; font-family: monospace; padding: 20px; }
    .lead-card { border: 1px solid #333; padding: 10px; margin-bottom: 10px; }
    .high-confidence { border-color: #0f0; }
    .low-confidence { border-color: #550; color: #888; }
  </style>
</head>

<body>
  <h1>kheAI</h1>
  {{> leadBoard}}
</body>

<template name="leadBoard">
  <p>Polling server memory every 3 seconds...</p>
  
  {{#each leads}}
    <div class="lead-card {{#if isHighConfidence confidence}}high-confidence{{/if}}">
      <h3>⚡ {{amount}} SATS | From: {{sender}}</h3>
      <p><strong>Note:</strong> {{note}}</p>
      <p><strong>Intelligence:</strong> {{verdict}} ({{confidence}}%)</p>
    </div>
  {{/each}}
</template>
